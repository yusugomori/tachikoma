name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: |
          # Use --pack-destination + glob rather than parsing npm pack stdout,
          # which lifecycle scripts (e.g. lefthook) can contaminate.
          mkdir -p pack-out
          npm pack --pack-destination pack-out
          # Stable asset name so install.sh can fetch releases/latest/download/tachikoma.tgz
          mv pack-out/*.tgz tachikoma.tgz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" tachikoma.tgz --title "${GITHUB_REF_NAME}" --generate-notes
